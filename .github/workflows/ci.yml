name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  simulate-and-synthesize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install open-source FPGA tools
        run: sudo apt-get update && sudo apt-get install -y iverilog yosys
      - run: make test
      - run: make synth
      - uses: actions/upload-artifact@v4
        with:
          name: yosys-report
          path: build/yosys.log


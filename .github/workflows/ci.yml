name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  simulate-and-synthesize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install open-source FPGA tools
        run: sudo apt-get update && sudo apt-get install -y iverilog yosys
      - run: make test
      - run: make synth
      - run: >
          python tools/build_schedule.py
          examples/tiny_char_transformer.plan.json
          -o build/tiny_char_transformer_schedule.hex
      - uses: actions/upload-artifact@v7
        with:
          name: yosys-report
          path: |
            build/yosys.log
            build/tiny_char_transformer_schedule.hex
